<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Intelligence Lookup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>IP Intelligence Lookup</h1>
      <p class="tagline">Query multiple threat intel sources at once in new tabs</p>
    </header>

    <main class="main">
      <form class="search-form" id="searchForm">
        <div class="input-group">
          <label for="ipInput">IP address:</label>
          <input
            type="text"
            id="ipInput"
            name="ip"
            placeholder="1.1.1.1"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="input-hint" id="inputHint"></span>
        </div>
        <p class="popup-note">Note: Allow popups for this site to open all tabs at once.</p>
        <button type="submit" class="btn btn-primary" id="submitBtn">
          Search all sources
        </button>
      </form>

      <section class="sources">
        <h2>Sources:</h2>
        <p class="sources-desc">Open each site in a new tab with your IP.</p>
        <ul class="source-list" id="sourceList"></ul>
      </section>
    </main>

    <footer class="footer">
      <p><strong>Made with ❤️ by TonsOfFunn</strong></p>
    </footer>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
